<!-- Topbar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30 h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8 shadow-sm">
    <div class="flex-1 lg:hidden"></div>
    <div class="flex-1 flex items-center pl-10 lg:pl-0">
        <h2 class="text-xl font-bold text-slate-800 tracking-tight">{{ page_title|default:"Dashboard" }}</h2>
    </div>
    
    <div class="flex items-center gap-4">
        <!-- Date / Time indicator optional here -->
        
        <!-- Profile Dropdown (Simplified for now) -->
        <div class="relative flex items-center gap-3">
            <span class="hidden sm:block text-sm font-medium text-slate-600">{{ request.user.username }}</span>
            <button class="flex items-center justify-center w-9 h-9 rounded-full bg-brand-50 text-brand-600 font-bold text-sm border border-brand-100 hover:bg-brand-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 transition-colors">
                {{ request.user.username|first|upper }}
            </button>
        </div>
    </div>
</header>
