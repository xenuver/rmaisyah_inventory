<!-- Topbar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-30 h-16 flex items-center justify-between px-4 sm:px-6 shadow-sm">
    <div class="flex items-center gap-4">
        <!-- Sidebar Toggle -->
        <button id="sidebarToggle" class="p-2 rounded-lg bg-slate-50 border border-slate-200 text-slate-600 hover:text-brand-600 hover:bg-brand-50 focus:outline-none transition-colors" aria-label="Toggle menu">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
            </svg>
        </button>
        
        <h2 class="text-lg font-bold text-slate-800 tracking-tight hidden sm:block">{{ page_title|default:"Dashboard" }}</h2>
    </div>
    
    <div class="flex items-center gap-3 sm:gap-5">
        
        <!-- Search Bar (Visual) -->
        <div class="hidden md:flex relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-4 w-4 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/>
                </svg>
            </div>
            <input type="text" placeholder="Cari menu..." class="block w-48 lg:w-64 pl-9 pr-3 py-1.5 border border-slate-200 rounded-full text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-colors">
        </div>

        <!-- Notification Bell -->
        <button class="relative p-2 text-slate-500 hover:text-brand-600 rounded-full hover:bg-slate-100 transition-colors focus:outline-none">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
            </svg>
            <span class="absolute top-1.5 right-1.5 block w-2 h-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
        </button>

        <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>

        <!-- Profile Dropdown -->
        <div class="relative">
            <button id="profileBtn" class="flex items-center gap-2 focus:outline-none p-1 rounded-lg hover:bg-slate-50 transition-colors">
                <div class="flex items-center justify-center w-8 h-8 rounded-full bg-brand-100 text-brand-700 font-bold text-sm border border-brand-200">
                    {{ request.user.username|first|upper }}
                </div>
                <div class="hidden sm:flex flex-col items-start mr-1">
                    <span class="text-sm font-semibold text-slate-700 leading-tight">{{ request.user.username }}</span>
                    <span class="text-xs text-slate-500 leading-tight">Admin</span>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-slate-400 hidden sm:block">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/>
                </svg>
            </button>

            <!-- Dropdown Menu -->
            <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-slate-200 py-1 z-50 transform origin-top-right transition-all">
                <div class="px-4 py-2 border-b border-slate-100 sm:hidden">
                    <p class="text-sm font-medium text-slate-800">{{ request.user.username }}</p>
                    <p class="text-xs text-slate-500">Administrator</p>
                </div>
                
                <a href="#" class="block px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-brand-600 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
                    Profil Saya
                </a>
                
                <div class="border-t border-slate-100 my-1"></div>
                
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="w-full text-left px-4 py-2 text-sm text-rose-600 hover:bg-rose-50 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" /></svg>
                        Keluar
                    </button>
                </form>
            </div>
        </div>
    </div>
</header>
