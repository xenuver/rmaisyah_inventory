<!-- Sidebar -->
<aside id="sidebar" class="flex flex-col w-64 bg-slate-900 border-r border-slate-800 text-slate-300 h-screen fixed inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 transition-all duration-300 ease-in-out shadow-2xl lg:shadow-none">
    
    <!-- Brand -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-800">
        <div class="flex-shrink-0 flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-brand-600 shadow-inner">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-white">
                <path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z"/>
            </svg>
        </div>
        <div class="flex flex-col">
            <h1 class="text-white font-bold tracking-tight text-sm uppercase">RM Aisyah</h1>
            <span class="text-xs text-slate-400 font-medium">Inventory Admin</span>
        </div>
    </div>

    <!-- Navigation -->
    <div class="flex-1 overflow-y-auto px-4 py-6 space-y-1 no-scrollbar">
        
        <div class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-2">Menu Utama</div>
        
        <a href="{% url 'dashboard:index' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if request.resolver_match.app_name == 'dashboard' %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if request.resolver_match.app_name != 'dashboard' %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z"/>
            </svg>
            Dashboard
        </a>

        <div class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-6">Data Master</div>

        <a href="{% url 'inventory:barang_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'barang' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'barang' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9"/>
            </svg>
            Data Barang
        </a>

        <a href="{% url 'inventory:kategori_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'kategori' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'kategori' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 0 0 3 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 0 0 5.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 0 0 9.568 3Z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6Z"/>
            </svg>
            Kategori
        </a>

        <a href="{% url 'inventory:satuan_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'satuan' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'satuan' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v17.25m0 0c-1.472 0-2.882.265-4.185.75M12 20.25c1.472 0 2.882.265 4.185.75M18.75 4.97A48.416 48.416 0 0 0 12 4.5c-2.291 0-4.545.16-6.75.47m13.5 0c1.01.143 2.01.317 3 .52m-3-.52 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.988 5.988 0 0 1-2.031.352 5.988 5.988 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L18.75 4.971Zm-16.5.52c.99-.203 1.99-.377 3-.52m0 0 2.62 10.726c.122.499-.106 1.028-.589 1.202a5.989 5.989 0 0 1-2.031.352 5.989 5.989 0 0 1-2.031-.352c-.483-.174-.711-.703-.59-1.202L5.25 4.971Z"/>
            </svg>
            Satuan
        </a>

        <div class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 mt-6">Transaksi</div>

        <a href="{% url 'transactions:masuk_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'masuk' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'masuk' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
            </svg>
            Barang Masuk
        </a>

        <a href="{% url 'transactions:keluar_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'keluar' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'keluar' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
            </svg>
            Barang Keluar
        </a>

        <a href="{% url 'transactions:ledger_list' %}" class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 {% if 'ledger' in request.resolver_match.url_name %}bg-brand-600 text-white shadow-md shadow-brand-900/50{% else %}text-slate-400 hover:text-white hover:bg-slate-800{% endif %}">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-5 h-5 {% if 'ledger' not in request.resolver_match.url_name %}text-slate-500 group-hover:text-slate-300{% endif %}">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
            </svg>
            Log Ledger
        </a>
    </div>

    <!-- User Profile Minimal at Bottom -->
    <div class="p-4 border-t border-slate-800">
        <div class="flex items-center gap-3 p-2 rounded-lg bg-slate-800/50 border border-slate-700">
            <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-slate-300 font-bold text-sm">
                {{ request.user.username|first|upper }}
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate">{{ request.user.username }}</p>
            </div>
            <!-- Changed to form for Django 5/6 Logout compliance -->
            <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
                <button type="submit" class="p-1.5 text-slate-400 hover:text-red-400 hover:bg-slate-700 rounded-md transition-colors focus:outline-none" title="Keluar">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</aside>
